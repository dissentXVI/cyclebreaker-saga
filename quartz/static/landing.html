<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cyclebreaker Saga</title>
  <style>
    @font-face {
      font-family: 'OptimusPrinceps';
      src: url('/static/OptimusPrinceps.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.15);
      --gold-glow: rgba(201, 168, 76, 0.06);
      --white-dim: rgba(255, 255, 255, 0.55);
      --white-faint: rgba(255, 255, 255, 0.18);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Background layer (WebM slot) ─────────────────────────────────
       To activate: uncomment the video element in the HTML below,
       point src at your WebM file in /static/, and set video opacity. */
    .bg-video {
      display: none; /* change to block when ready */
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.35;
      z-index: 0;
    }

    /* ── Atmospheric overlay ──────────────────────────────────────────*/
    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, rgba(20, 15, 8, 0) 0%, #000 100%),
        radial-gradient(ellipse 80% 40% at 50% 100%, rgba(201, 168, 76, 0.04) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Noise texture ────────────────────────────────────────────────*/
    .bg-noise {
      position: fixed;
      inset: 0;
      opacity: 0.025;
      z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      pointer-events: none;
    }

    /* ── Main container ───────────────────────────────────────────────*/
    .stage {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── Top ornament line ────────────────────────────────────────────*/
    .ornament-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.2s;
      margin-bottom: 2.5rem;
    }

    .ornament-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .ornament-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.6;
    }

    /* ── Symbol ───────────────────────────────────────────────────────*/
    .symbol-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 0.5s;
    }

    .symbol-glow {
      position: absolute;
      inset: -40px;
      background: radial-gradient(ellipse at center, rgba(201, 168, 76, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .symbol-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: invert(1) sepia(1) saturate(0.4) brightness(0.85);
      opacity: 0.9;
    }

    /* ── Title ────────────────────────────────────────────────────────*/
    .site-title {
      font-family: 'OptimusPrinceps', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: rgba(255, 255, 255, 0.88);
      letter-spacing: 0.18em;
      text-align: center;
      line-height: 1.3;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1s;
      margin-bottom: 0.6rem;
      text-shadow: 0 0 40px rgba(201, 168, 76, 0.15);
    }

    /* ── Subtitle ─────────────────────────────────────────────────────*/
    .site-subtitle {
      font-family: 'OptimusPrinceps', serif;
      font-size: clamp(0.55rem, 1.2vw, 0.72rem);
      color: var(--gold);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.2s;
      margin-bottom: 3.5rem;
    }

    /* ── Divider ──────────────────────────────────────────────────────*/
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 1.4s;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.3));
    }

    .divider-line.right {
      background: linear-gradient(270deg, transparent, rgba(201, 168, 76, 0.3));
    }

    .divider-symbol {
      font-size: 0.7rem;
      color: var(--gold);
      opacity: 0.6;
      letter-spacing: 0.2em;
    }

    /* ── Enter button ─────────────────────────────────────────────────*/
    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 2.4rem;
      border: 1px solid rgba(201, 168, 76, 0.35);
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      font-family: 'OptimusPrinceps', serif;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.6s;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .enter-btn:hover {
      color: rgba(255, 255, 255, 0.95);
      border-color: rgba(201, 168, 76, 0.7);
    }

    .enter-btn:hover::before {
      opacity: 1;
    }

    .enter-arrow {
      font-size: 0.9rem;
      opacity: 0.6;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .enter-btn:hover .enter-arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    /* ── Bottom ornament ──────────────────────────────────────────────*/
    .ornament-bottom {
      position: absolute;
      bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      animation-delay: 2s;
    }

    .ornament-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(201, 168, 76, 0.4);
    }

    /* ── Animations ───────────────────────────────────────────────────*/
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ───────────────────────────────────────────────────*/
    @media (max-width: 480px) {
      .symbol-wrap {
        width: 110px;
        height: 110px;
      }
      .ornament-line { width: 50px; }
      .divider-line  { width: 40px; }
    }
  </style>
</head>
<body>

  <!-- WebM background — uncomment and set src when ready
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/static/background.webm" type="video/webm">
  </video>
  -->

  <div class="bg-overlay"></div>
  <div class="bg-noise"></div>

  <main class="stage">

    <div class="ornament-top">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>

    <div class="symbol-wrap">
      <div class="symbol-glow"></div>
      <img src="/static/CB_Symbol_Glow.png" alt="The Cyclebreaker Saga">
    </div>

    <h1 class="site-title">The Cyclebreaker Saga</h1>
    <p class="site-subtitle">The Archive</p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-symbol">⟡</span>
      <div class="divider-line right"></div>
    </div>

    <a href="https://thecyclebreakersaga.com" class="enter-btn">
      Enter
      <span class="enter-arrow">→</span>
    </a>

    <div class="ornament-bottom">
      <div class="ornament-dot"></div>
      <div class="ornament-dot"></div>
      <div class="ornament-dot"></div>
    </div>

  </main>

</body>
</html>
